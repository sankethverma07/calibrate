<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" font-family="-apple-system, 'Neue Montreal', 'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <!-- Background gradient: deep, very subtle vertical -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#06080c"/>
    </linearGradient>

    <!-- Liquid-glass card fill -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.045"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.015"/>
    </linearGradient>

    <!-- Off-screen accent (cool teal) -->
    <linearGradient id="acc-cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fb3d1" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#5e8fb0" stop-opacity="0.95"/>
    </linearGradient>

    <!-- On-screen accent (warm cream) -->
    <linearGradient id="acc-warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1e7d2" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d8c8a8" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Mood gradient strip -->
    <linearGradient id="mood-strip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#86c8b5"/>
      <stop offset="33%"  stop-color="#5e8fb0"/>
      <stop offset="66%"  stop-color="#a39ad9"/>
      <stop offset="100%" stop-color="#d9a674"/>
    </linearGradient>

    <!-- Soft particle glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ab4c6"/>
    </marker>
    <marker id="arrow-warm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8c8a8"/>
    </marker>
  </defs>

  <!-- Backdrop -->
  <rect width="1920" height="1200" fill="url(#bg)"/>

  <!-- Subtle ambient particles (decorative) -->
  <g opacity="0.35">
    <circle cx="180"  cy="160"  r="1.5" fill="#a8c0d0"/>
    <circle cx="320"  cy="940"  r="1.2" fill="#a8c0d0"/>
    <circle cx="1620" cy="220"  r="1.5" fill="#a8c0d0"/>
    <circle cx="1780" cy="980"  r="1.0" fill="#a8c0d0"/>
    <circle cx="900"  cy="120"  r="1.2" fill="#a8c0d0"/>
    <circle cx="540"  cy="1100" r="1.0" fill="#a8c0d0"/>
    <!-- bokeh discs -->
    <circle cx="120"  cy="600"  r="40"  fill="#5e8fb0" opacity="0.06" filter="url(#glow)"/>
    <circle cx="1820" cy="500"  r="50"  fill="#a39ad9" opacity="0.06" filter="url(#glow)"/>
    <circle cx="960"  cy="1080" r="44"  fill="#86c8b5" opacity="0.05" filter="url(#glow)"/>
  </g>

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <g transform="translate(120, 90)">
    <text x="0" y="0" fill="#f5f3ee" font-size="56" font-weight="500" letter-spacing="-1.5">Calibrate</text>
    <text x="0" y="40" fill="#9ca3af" font-size="20" font-weight="400" letter-spacing="0.3">System architecture · kernel ↔ pixels</text>
  </g>

  <!-- Mood swatch strip -->
  <g transform="translate(1280, 100)">
    <rect x="0" y="0" width="520" height="6" rx="3" fill="url(#mood-strip)"/>
    <g font-size="13" fill="#9ca3af" letter-spacing="1.6" font-weight="500">
      <text x="0"   y="32">CRUISING</text>
      <text x="160" y="32">LOCKED</text>
      <text x="290" y="32">DRIFT</text>
      <text x="420" y="32">RESTLESS</text>
    </g>
  </g>

  <!-- ── Section labels ─────────────────────────────────────────── -->
  <g transform="translate(120, 200)">
    <text fill="#7fb3d1" font-size="13" font-weight="500" letter-spacing="3">OFF-SCREEN  ·  KERNEL + ELECTRON MAIN</text>
    <line x1="0" y1="14" x2="800" y2="14" stroke="#7fb3d1" stroke-opacity="0.25"/>
  </g>
  <g transform="translate(1000, 200)">
    <text fill="#d8c8a8" font-size="13" font-weight="500" letter-spacing="3">ON-SCREEN  ·  RENDERER (CHROMIUM)</text>
    <line x1="0" y1="14" x2="800" y2="14" stroke="#d8c8a8" stroke-opacity="0.25"/>
  </g>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!--  OFF-SCREEN COLUMN                                            -->
  <!-- ──────────────────────────────────────────────────────────── -->

  <!-- Card: Windows kernel -->
  <g transform="translate(120, 250)">
    <rect width="800" height="190" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="42" fill="#7fb3d1" font-size="11" font-weight="500" letter-spacing="2.5">WINDOWS KERNEL</text>
    <text x="32" y="78" fill="#f5f3ee" font-size="22" font-weight="500" letter-spacing="-0.3">Raw Input pipe + AudioEngine APO chain</text>
    <text x="32" y="108" fill="#9ca3af" font-size="14" font-weight="400" line-height="1.5">Every keystroke, every mouse delta enters here before the OS</text>
    <text x="32" y="128" fill="#9ca3af" font-size="14" font-weight="400">routes it to a focused app — so we capture even when minimized.</text>

    <!-- icons row -->
    <g transform="translate(32, 150)">
      <g><circle cx="0" cy="0" r="4" fill="#7fb3d1"/><text x="14" y="5" fill="#cbd5e1" font-size="13">◆ uiohook-napi (raw input hook)</text></g>
      <g transform="translate(310, 0)"><circle cx="0" cy="0" r="4" fill="#7fb3d1"/><text x="14" y="5" fill="#cbd5e1" font-size="13">◆ Equalizer APO (8-band IIR)</text></g>
      <g transform="translate(620, 0)"><circle cx="0" cy="0" r="4" fill="#86c8b5"/><text x="14" y="5" fill="#cbd5e1" font-size="13">⏱ ~10 ms reload</text></g>
    </g>
  </g>

  <!-- Card: Electron main -->
  <g transform="translate(120, 470)">
    <rect width="800" height="240" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="42" fill="#7fb3d1" font-size="11" font-weight="500" letter-spacing="2.5">ELECTRON MAIN PROCESS  ·  Node + Chromium</text>
    <text x="32" y="78" fill="#f5f3ee" font-size="22" font-weight="500" letter-spacing="-0.3">Plumbing: bridges kernel events to the renderer</text>

    <!-- 4 columns -->
    <g transform="translate(32, 116)" font-size="13" fill="#cbd5e1">
      <g>
        <text fill="#7fb3d1" font-size="11" font-weight="500" letter-spacing="1.5">▣ HOOKS</text>
        <text y="22">uIOhook listener</text>
        <text y="40">key + mouse + click</text>
      </g>
      <g transform="translate(190, 0)">
        <text fill="#7fb3d1" font-size="11" font-weight="500" letter-spacing="1.5">▣ APO WRITER</text>
        <text y="22">debounced 250 ms</text>
        <text y="40">writes calibrate-eq.txt</text>
      </g>
      <g transform="translate(380, 0)">
        <text fill="#7fb3d1" font-size="11" font-weight="500" letter-spacing="1.5">▣ NOW PLAYING</text>
        <text y="22">PowerShell + WinRT</text>
        <text y="40">poll every 2 s</text>
      </g>
      <g transform="translate(580, 0)">
        <text fill="#7fb3d1" font-size="11" font-weight="500" letter-spacing="1.5">▣ IPC</text>
        <text y="22">named pipe</text>
        <text y="40">contextBridge</text>
      </g>
    </g>

    <!-- preload bridge label -->
    <text x="32" y="208" fill="#9ca3af" font-size="13">preload.js exposes  <tspan fill="#86c8b5">window.moodBridge</tspan>  · the only surface the renderer can touch</text>
  </g>

  <!-- Card: APO config file -->
  <g transform="translate(120, 740)">
    <rect width="800" height="160" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="42" fill="#86c8b5" font-size="11" font-weight="500" letter-spacing="2.5">APO CONFIG  ·  the source of audio truth</text>
    <text x="32" y="78" fill="#f5f3ee" font-size="20" font-weight="500" letter-spacing="-0.2">C:\Program Files\EqualizerAPO\config\calibrate-eq.txt</text>
    <text x="32" y="106" fill="#9ca3af" font-size="13">Filter 1: ON PK Fc 60 Hz   Gain −1.0 dB   Q 1.41</text>
    <text x="32" y="124" fill="#9ca3af" font-size="13">Filter 2: ON PK Fc 170 Hz  Gain  0.0 dB   Q 1.41   …</text>
    <text x="32" y="142" fill="#7fb3d1" font-size="12" letter-spacing="0.5">↻ kernel notices file mtime change · reapplies in real time · all apps shaped at once</text>
  </g>

  <!-- Card: Mood classifier -->
  <g transform="translate(120, 930)">
    <rect width="800" height="190" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="42" fill="#a39ad9" font-size="11" font-weight="500" letter-spacing="2.5">MOOD CLASSIFIER  ·  evidence-calibrated</text>
    <text x="32" y="78" fill="#f5f3ee" font-size="20" font-weight="500" letter-spacing="-0.2">IKI mean + IKI σ vs personal 90-second baseline</text>

    <!-- 4 mood mini-rows -->
    <g transform="translate(32, 110)" font-size="13">
      <g>
        <circle cx="6" cy="0" r="6" fill="#86c8b5"/>
        <text x="22" y="5" fill="#f5f3ee" font-weight="500">cruising</text>
        <text x="92" y="5" fill="#9ca3af">[−1, 0, 1, 2, 2, 1, 0, −1]</text>
      </g>
      <g transform="translate(360, 0)">
        <circle cx="6" cy="0" r="6" fill="#5e8fb0"/>
        <text x="22" y="5" fill="#f5f3ee" font-weight="500">locked</text>
        <text x="80" y="5" fill="#9ca3af">[−2, −1, 1, 3, 3, 1, −1, −2]</text>
      </g>
      <g transform="translate(0, 32)">
        <circle cx="6" cy="0" r="6" fill="#a39ad9"/>
        <text x="22" y="5" fill="#f5f3ee" font-weight="500">drift</text>
        <text x="92" y="5" fill="#9ca3af">[ 0, 1, 2, 1, 2, 3, 3, 2]    Söderlund MBA</text>
      </g>
      <g transform="translate(360, 32)">
        <circle cx="6" cy="0" r="6" fill="#d9a674"/>
        <text x="22" y="5" fill="#f5f3ee" font-weight="500">restless</text>
        <text x="80" y="5" fill="#9ca3af">[−2, −1, 0, −1, −1, 0, 1, 2]   calming</text>
      </g>
    </g>
    <text x="32" y="170" fill="#9ca3af" font-size="12">Source: Lau 2018 IKI-SD · medRxiv 2025 field stress · personal calibration replaces fixed thresholds</text>
  </g>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!--  CENTER FLOW LANE                                             -->
  <!-- ──────────────────────────────────────────────────────────── -->
  <g transform="translate(940, 250)">
    <!-- Flow card -->
    <rect width="60" height="870" rx="30" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.05"/>
    <!-- top arrow: kernel → renderer (cool) -->
    <path d="M 30 70 L 30 380" stroke="#7fb3d1" stroke-width="1.5" stroke-opacity="0.55" fill="none" marker-end="url(#arrow)"/>
    <text x="-180" y="225" fill="#7fb3d1" font-size="11" letter-spacing="1.8">kernel → main → renderer</text>
    <text x="-180" y="245" fill="#9ca3af" font-size="11">keycode + isError flag only</text>

    <!-- middle arrow: renderer → main (warm) -->
    <path d="M 30 480 L 30 800" stroke="#d8c8a8" stroke-width="1.5" stroke-opacity="0.55" fill="none" marker-end="url(#arrow-warm)"/>
    <text x="80" y="630" fill="#d8c8a8" font-size="11" letter-spacing="1.8">renderer → main → APO</text>
    <text x="80" y="650" fill="#9ca3af" font-size="11">8 band gains · "EQ on/off"</text>

    <!-- audio output arrow -->
    <path d="M 30 820 L 30 850" stroke="#86c8b5" stroke-width="2" stroke-opacity="0.7" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!--  ON-SCREEN COLUMN                                             -->
  <!-- ──────────────────────────────────────────────────────────── -->

  <!-- Card: Renderer / index.html overlay -->
  <g transform="translate(1020, 250)">
    <rect width="800" height="260" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="42" fill="#d8c8a8" font-size="11" font-weight="500" letter-spacing="2.5">RENDERER  ·  dist/public/index.html</text>
    <text x="32" y="78" fill="#f5f3ee" font-size="22" font-weight="500" letter-spacing="-0.3">React bundle + CSS / JS overlay</text>
    <text x="32" y="106" fill="#9ca3af" font-size="14">Two views, one window. The overlay layer adds the calibration tab,</text>
    <text x="32" y="126" fill="#9ca3af" font-size="14">cartoon mood face, and the Alienware DoF particle canvas.</text>

    <!-- Mock UI for dashboard view -->
    <g transform="translate(32, 156)">
      <rect x="0" y="0" width="350" height="80" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
      <text x="14" y="22" fill="#cbd5e1" font-size="11" letter-spacing="2">DASHBOARD VIEW</text>
      <text x="14" y="44" fill="#f5f3ee" font-size="13" font-weight="500">Signals · Schedule · Equalizer · Now Playing</text>
      <text x="14" y="64" fill="#9ca3af" font-size="12">Playground typing card · Apple-style sidebar metrics</text>
    </g>
    <g transform="translate(404, 156)">
      <rect x="0" y="0" width="364" height="80" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
      <text x="14" y="22" fill="#cbd5e1" font-size="11" letter-spacing="2">CALIBRATION VIEW (new)</text>
      <text x="14" y="44" fill="#f5f3ee" font-size="13" font-weight="500">Cartoon mood face · scroll-snap widgets</text>
      <text x="14" y="64" fill="#9ca3af" font-size="12">Schedule → Equalizer → Typing · 3 → 2 → 1</text>
    </g>
  </g>

  <!-- Card: Cartoon mood face (visual) -->
  <g transform="translate(1020, 540)">
    <rect width="380" height="280" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="42" fill="#d8c8a8" font-size="11" font-weight="500" letter-spacing="2.5">CARTOON MOOD FACE</text>

    <!-- 4 emoji circles representing moods -->
    <g transform="translate(50, 90)">
      <circle cx="40" cy="40" r="32" fill="#86c8b5" fill-opacity="0.18" stroke="#86c8b5" stroke-opacity="0.5"/>
      <text x="40" y="50" font-size="32" text-anchor="middle">🌿</text>
      <text x="40" y="100" fill="#cbd5e1" font-size="12" text-anchor="middle">cruising</text>
    </g>
    <g transform="translate(140, 90)">
      <circle cx="40" cy="40" r="32" fill="#5e8fb0" fill-opacity="0.18" stroke="#5e8fb0" stroke-opacity="0.5"/>
      <text x="40" y="50" font-size="32" text-anchor="middle">🎯</text>
      <text x="40" y="100" fill="#cbd5e1" font-size="12" text-anchor="middle">locked</text>
    </g>
    <g transform="translate(230, 90)">
      <circle cx="40" cy="40" r="32" fill="#a39ad9" fill-opacity="0.18" stroke="#a39ad9" stroke-opacity="0.5"/>
      <text x="40" y="50" font-size="32" text-anchor="middle">💭</text>
      <text x="40" y="100" fill="#cbd5e1" font-size="12" text-anchor="middle">drift</text>
    </g>
    <g transform="translate(50, 220)">
      <circle cx="40" cy="40" r="32" fill="#d9a674" fill-opacity="0.18" stroke="#d9a674" stroke-opacity="0.5"/>
      <text x="40" y="50" font-size="32" text-anchor="middle">⚡</text>
      <text x="40" y="100" fill="#cbd5e1" font-size="12" text-anchor="middle">restless</text>
    </g>

    <text x="200" y="240" fill="#9ca3af" font-size="12">Stats-for-Nerds toggle</text>
    <text x="200" y="258" fill="#9ca3af" font-size="12">swaps face for raw metrics</text>
  </g>

  <!-- Card: Particle canvas -->
  <g transform="translate(1420, 540)">
    <rect width="400" height="280" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="42" fill="#d8c8a8" font-size="11" font-weight="500" letter-spacing="2.5">ALIENWARE DoF CANVAS</text>
    <text x="32" y="76" fill="#f5f3ee" font-size="18" font-weight="500">180 fixed particles</text>
    <text x="32" y="98" fill="#9ca3af" font-size="13">Shallow z-axis depth of field</text>

    <!-- visual representation of particles -->
    <g transform="translate(40, 130)">
      <!-- bokeh out-of-focus -->
      <circle cx="50"  cy="40" r="22" fill="#a39ad9" opacity="0.18" filter="url(#glow)"/>
      <circle cx="280" cy="50" r="18" fill="#5e8fb0" opacity="0.16" filter="url(#glow)"/>
      <circle cx="180" cy="100" r="26" fill="#86c8b5" opacity="0.14" filter="url(#glow)"/>
      <circle cx="80" cy="120" r="14" fill="#d9a674" opacity="0.16" filter="url(#glow)"/>
      <!-- in-focus pin-pricks -->
      <circle cx="120" cy="60" r="1.6" fill="#f5f3ee"/>
      <circle cx="220" cy="80" r="1.4" fill="#f5f3ee"/>
      <circle cx="60"  cy="80" r="1.2" fill="#f5f3ee"/>
      <circle cx="280" cy="120" r="1.5" fill="#f5f3ee"/>
      <circle cx="160" cy="40" r="1.0" fill="#f5f3ee"/>
    </g>
    <text x="32" y="258" fill="#9ca3af" font-size="12">Mood drives speed, cohesion, hue</text>
  </g>

  <!-- Card: Liquid glass widget stack -->
  <g transform="translate(1020, 850)">
    <rect width="800" height="270" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="42" fill="#d8c8a8" font-size="11" font-weight="500" letter-spacing="2.5">SCROLL-SNAP WIDGETS  ·  3 → 2 → 1</text>

    <!-- mini stacked cards -->
    <g transform="translate(32, 70)">
      <rect x="0" y="0" width="734" height="55" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
      <text x="20" y="22" fill="#cbd5e1" font-size="11" letter-spacing="2">SCHEDULE  ·  priority 3</text>
      <text x="20" y="42" fill="#f5f3ee" font-size="14">Sprint Deadline · 10 – 12 am</text>
    </g>
    <g transform="translate(32, 135)">
      <rect x="0" y="0" width="734" height="55" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
      <text x="20" y="22" fill="#cbd5e1" font-size="11" letter-spacing="2">EQUALIZER  ·  priority 2</text>
      <text x="20" y="42" fill="#f5f3ee" font-size="14">8-band live preset · shapes the whole OS</text>
      <!-- mini bars -->
      <g transform="translate(560, 12)">
        <rect x="0"  y="22" width="9" height="14" fill="#7fb3d1" opacity="0.7"/>
        <rect x="14" y="14" width="9" height="22" fill="#7fb3d1" opacity="0.8"/>
        <rect x="28" y="6"  width="9" height="30" fill="#7fb3d1" opacity="0.9"/>
        <rect x="42" y="2"  width="9" height="34" fill="#7fb3d1"/>
        <rect x="56" y="2"  width="9" height="34" fill="#7fb3d1"/>
        <rect x="70" y="6"  width="9" height="30" fill="#7fb3d1" opacity="0.9"/>
        <rect x="84" y="14" width="9" height="22" fill="#7fb3d1" opacity="0.8"/>
        <rect x="98" y="22" width="9" height="14" fill="#7fb3d1" opacity="0.7"/>
      </g>
    </g>
    <g transform="translate(32, 200)">
      <rect x="0" y="0" width="734" height="55" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
      <text x="20" y="22" fill="#cbd5e1" font-size="11" letter-spacing="2">TYPING  ·  priority 1</text>
      <text x="20" y="42" fill="#f5f3ee" font-size="14">"Take a slow breath. Read this gently. There is no timer."</text>
    </g>
  </g>

  <!-- ──────────────────────────────────────────────────────────── -->
  <!--  PRIVACY BOUNDARY (footer band)                               -->
  <!-- ──────────────────────────────────────────────────────────── -->
  <g transform="translate(120, 1140)">
    <line x1="0" y1="0" x2="1700" y2="0" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="0" y="32" fill="#86c8b5" font-size="11" letter-spacing="2.5" font-weight="500">PRIVACY CONTRACT</text>
    <text x="200" y="32" fill="#cbd5e1" font-size="13">
      kernel → main: keycode only · main → renderer: isError flag · main → disk: 8 band gains ·
      <tspan fill="#86c8b5">network: zero outbound</tspan>
    </text>
    <text x="1500" y="32" fill="#9ca3af" font-size="11" text-anchor="end">Local · Private · Never sent</text>
  </g>

</svg>
