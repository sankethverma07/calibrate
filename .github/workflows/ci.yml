name: CI

# Lightweight production-stack hygiene.
# Two flows live in here:
#   • build  — runs on every push/PR to main. Typecheck + build, upload dist/
#              as a 7-day artifact. Acts as the "is this PR shippable" gate.
#   • release — runs ONLY on tag pushes that look like v1.2.3. Builds the
#              Electron installer on each OS that has a packaging target
#              (Windows/macOS/Linux) and uploads every artifact to a fresh
#              GitHub Release for that tag. A single `git push origin v1.0.1`
#              becomes a published release with downloadable installers.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same branch/tag when a newer commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Always run: typecheck + build the renderer bundle ──────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # `tsc` only — fast, catches type regressions before merge.
      - name: Typecheck
        run: npm run check

      - name: Build (server + client bundles)
        run: npm run build

      - name: Upload build artifact (dist/)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: calibrate-dist-${{ github.sha }}
          path: dist
          retention-days: 7
          if-no-files-found: warn

  # ─── Tag-triggered: build the Windows installer and publish it to a ──
  #     GitHub Release for the tag.
  #
  #     Why Windows-only:
  #       • The EQ actuator (Equalizer APO) is Windows-only — no macOS or
  #         Linux equivalent ships with Calibrate today.
  #       • Now Playing detection uses PowerShell + the Windows
  #         GlobalSystemMediaTransportControlsSessionManager API.
  #     Building Mac / Linux artifacts would produce installers that LAUNCH
  #     but silently fail to do the one thing Calibrate exists to do — so we
  #     don't ship them. macOS + Linux are on the roadmap as separate work.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      # Required so softprops/action-gh-release can create the release.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Build web bundle (dist/public/)
        # electron-builder packages dist/public/ via extraResources, so the
        # web build has to happen before electron-builder runs.
        run: npm run build:client

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build Windows installer
        working-directory: electron
        # We let action-gh-release publish; just build the .exe locally here.
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to the Release
        uses: softprops/action-gh-release@v2
        with:
          # The tag that triggered the workflow is reused as the release tag.
          # action-gh-release creates the release on first call.
          files: electron/dist/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
