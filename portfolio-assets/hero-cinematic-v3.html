<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calibrate · Hero v3 — Bokeh Reveal</title>
  <!--
    Calibrate · P1 Hero · v3
    ─────────────────────────────────────────────────────────────────
    A miniature-product-focus reveal. Opens on out-of-focus bokeh
    particles, racks focus into the scene, particle field dims, and
    the glass card materialises with eight EQ bars that "tweak in"
    one by one — same glassmorphism as the app. Particles cast their
    own light onto the bars (additive blending behind transmissive
    glass).

    Render: Three.js r158 · Single GLSL pass · No postprocessing.
    Open in Chrome (F11 fullscreen, R replay, H toggle HUD).

    © 2026 Sanketh Verma <sankethverma07@gmail.com> · MIT
  -->
  <link href="https://fonts.cdnfonts.com/css/pp-neue-montreal" rel="stylesheet">
  <style>
    :root { --bg: #04060a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: var(--bg);
      color: #fff;
      font-family: 'PP Neue Montreal', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      overflow: hidden;
      width: 100%; height: 100%;
      -webkit-font-smoothing: antialiased;
    }
    .stage {
      position: fixed; inset: 0;
      background: var(--bg);
      isolation: isolate;
    }
    canvas#stage {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* Cinematic letterboxing */
    .letterbox {
      position: absolute; left: 0; right: 0;
      height: 4.5vh;
      background: #000;
      z-index: 5; pointer-events: none;
    }
    .letterbox.top    { top: 0; }
    .letterbox.bottom { bottom: 0; }

    /* Vignette + grain — adds film texture */
    .vignette {
      position: absolute; inset: 0; pointer-events: none; z-index: 4;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.78) 100%);
    }
    .grain {
      position: absolute; inset: 0; pointer-events: none; z-index: 6;
      opacity: 0.045; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
    }

    /* Wordmark — appears late */
    #wordmark {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 7; pointer-events: none;
      font-weight: 200;
      font-size: clamp(46px, 5.4vw, 84px);
      letter-spacing: 0.55em;
      color: rgba(255, 255, 255, 0.96);
      opacity: 0;
      padding-left: 0.55em;
      text-shadow:
        0 0 60px rgba(255, 255, 255, 0.22),
        0 0 140px rgba(120, 180, 255, 0.18);
      transition:
        opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1),
        letter-spacing 1.8s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #tagline {
      position: absolute; left: 50%; bottom: 9.5%;
      transform: translateX(-50%);
      z-index: 7; pointer-events: none;
      font-weight: 300;
      font-size: clamp(10px, 0.95vw, 13px);
      letter-spacing: 0.42em;
      color: rgba(255, 255, 255, 0.55);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.5s;
    }

    #replay {
      position: absolute; right: 22px; bottom: calc(4.5vh + 18px); z-index: 9;
      appearance: none;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 9px 18px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      cursor: pointer;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.7s ease, background 0.2s ease;
    }
    #replay:hover { background: rgba(255, 255, 255, 0.10); }

    #hud {
      position: absolute; left: 22px; top: calc(4.5vh + 18px); z-index: 9;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 10px; letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.55);
      background: rgba(0,0,0,0.4);
      padding: 7px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      display: none;
    }
    #hud.show { display: block; }
  </style>
</head>
<body>
  <div class="stage">
    <canvas id="stage"></canvas>
    <div class="vignette"></div>
    <div class="grain"></div>
    <div class="letterbox top"></div>
    <div class="letterbox bottom"></div>
    <div id="wordmark">CALIBRATE</div>
    <div id="tagline">audio · that reads · how you focus</div>
    <button id="replay" type="button">Replay</button>
    <div id="hud">t = 0.00 · shot — · focal — · aperture —</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    /* ════════════════════════════════════════════════════════════════
       1 · SETUP
       ──────────────────────────────────────────────────────────────── */
    const canvas   = document.getElementById('stage');
    const wordmark = document.getElementById('wordmark');
    const tagline  = document.getElementById('tagline');
    const replay   = document.getElementById('replay');
    const hud      = document.getElementById('hud');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x04060a);
    // No fog — custom ShaderMaterial doesn't read scene.fog anyway, and we want
    // the bokeh field to read against pure black.

    const camera = new THREE.PerspectiveCamera(34, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 1.4, 9);
    camera.lookAt(0, 1.2, 0);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    // No tone mapping — keeps the bokeh discs as bright as we paint them.
    renderer.toneMapping = THREE.NoToneMapping;

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    /* ════════════════════════════════════════════════════════════════
       2 · MOOD PALETTE
       ──────────────────────────────────────────────────────────────── */
    const MOODS = {
      cruising: { color: new THREE.Color(0x2dd4bf), warm: new THREE.Color(0x5eead4) },
      locked:   { color: new THREE.Color(0x60a5fa), warm: new THREE.Color(0x93c5fd) },
      drift:    { color: new THREE.Color(0xc084fc), warm: new THREE.Color(0xd8b4fe) },
    };
    const moodColor = MOODS.cruising.color.clone();
    const moodWarm  = MOODS.cruising.warm.clone();

    /* ════════════════════════════════════════════════════════════════
       3 · PARTICLE OCEAN with simulated DOF / bokeh
       ──────────────────────────────────────────────────────────────── */
    const PARTICLE_COUNT = 5500;

    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const phases    = new Float32Array(PARTICLE_COUNT);
    const seeds     = new Float32Array(PARTICLE_COUNT);
    const sizes     = new Float32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      // Distribute in a wide volume around the future card position (0, 1.4, 0)
      // Wider on x/z than y so it reads as a horizontal field
      const r = Math.pow(Math.random(), 0.6);
      const theta = Math.random() * Math.PI * 2;
      const radius = r * 7.5 + 0.5;

      positions[i * 3 + 0] = Math.cos(theta) * radius * (0.9 + Math.random() * 0.5);
      positions[i * 3 + 1] = 1.4 + (Math.random() - 0.5) * 3.2;
      positions[i * 3 + 2] = Math.sin(theta) * radius * 0.7 - radius * 0.2;

      phases[i] = Math.random() * Math.PI * 2;
      seeds[i]  = Math.random();
      sizes[i]  = 0.45 + Math.random() * 1.1;
    }

    const particleGeo = new THREE.BufferGeometry();
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeo.setAttribute('aPhase',   new THREE.BufferAttribute(phases, 1));
    particleGeo.setAttribute('aSeed',    new THREE.BufferAttribute(seeds, 1));
    particleGeo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));

    const particleMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime:       { value: 0 },
        uFocalDist:  { value: 12.0 },   // distance from camera that's perfectly sharp
        uAperture:   { value: 0.22 },   // larger = more blur
        uBaseSize:   { value: 2.4 },
        uOpacity:    { value: 1.0 },
        uMoodColor:  { value: moodColor },
        uMoodWarm:   { value: moodWarm },
        uPxRatio:    { value: renderer.getPixelRatio() },
        uMaxBokehPx: { value: 95.0 },   // cap point size so bokeh discs stay reasonable
      },
      vertexShader: /* glsl */`
        uniform float uTime;
        uniform float uFocalDist;
        uniform float uAperture;
        uniform float uBaseSize;
        uniform float uPxRatio;
        uniform float uMaxBokehPx;
        uniform vec3  uMoodColor;
        uniform vec3  uMoodWarm;

        attribute float aPhase;
        attribute float aSeed;
        attribute float aSize;

        varying float vBlur;
        varying vec3  vColor;

        void main() {
          vec3 pos = position;

          // Slow drift — never stops moving
          pos.y += sin(uTime * 0.32 + aPhase) * 0.10 * (0.4 + aSeed);
          pos.x += cos(uTime * 0.21 + aPhase * 1.7) * 0.07;
          pos.z += sin(uTime * 0.14 + aPhase * 0.9) * 0.05;

          vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
          float dist = max(0.5, -mvPos.z);

          // Circle of confusion — distance from focal plane, scaled by aperture
          float coc = abs(dist - uFocalDist) * uAperture;

          // Sharp particles are tiny bright pinpricks. Bokeh particles are larger soft discs.
          float sharpPx = uBaseSize * aSize * (320.0 / dist) * uPxRatio;
          float bokehPx = coc * 14.0 * uPxRatio;                  // distance-independent so far field stays manageable
          gl_PointSize = min(sharpPx + bokehPx, uMaxBokehPx);

          vBlur  = clamp(coc, 0.0, 1.5);

          // Tint between cool mood color and warm highlight, biased per particle
          vColor = mix(uMoodColor, uMoodWarm, 0.20 + aSeed * 0.65);

          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: /* glsl */`
        uniform float uOpacity;
        varying float vBlur;
        varying vec3  vColor;

        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float r = length(uv) * 2.0;
          if (r > 1.0) discard;

          float t = clamp(vBlur / 1.5, 0.0, 1.0);

          // Sharp falloff — bright pinprick of light
          float sharp = pow(1.0 - r, 4.0);

          // Bokeh disc — soft uniform brightness with bright ring at edge (real bokeh look)
          float disc = smoothstep(1.0, 0.80, r) * 0.70;
          float ring = smoothstep(0.78, 0.93, r) * smoothstep(1.0, 0.93, r) * 1.4;
          float bokeh = disc + ring;

          float falloff = mix(sharp, bokeh, t);

          // Cinematic bokeh stays bright — only slight dimming when blurred
          float bright = mix(1.8, 0.95, t);

          float alpha = falloff * bright * uOpacity;
          if (alpha < 0.003) discard;

          gl_FragColor = vec4(vColor * bright, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });

    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    /* ════════════════════════════════════════════════════════════════
       4 · GLASS CARD — frosted plate behind the bars
       ──────────────────────────────────────────────────────────────── */
    const cardGeo = new THREE.PlaneGeometry(3.6, 1.8, 1, 1);
    const cardMat = new THREE.ShaderMaterial({
      uniforms: {
        uOpacity:   { value: 0.0 },
        uMoodColor: { value: moodColor },
        uTime:      { value: 0 },
      },
      vertexShader: /* glsl */`
        varying vec2 vUv;
        varying vec3 vNormal;
        varying vec3 vViewPos;
        void main() {
          vUv = uv;
          vNormal = normalize(normalMatrix * normal);
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          vViewPos = -mvPos.xyz;
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: /* glsl */`
        uniform float uOpacity;
        uniform vec3  uMoodColor;
        uniform float uTime;
        varying vec2 vUv;
        varying vec3 vNormal;
        varying vec3 vViewPos;

        void main() {
          vec3 V = normalize(vViewPos);
          float fresnel = pow(1.0 - max(0.0, dot(vNormal, V)), 1.8);

          // Soft inward radial glow — looks like the app's glass card
          vec2 c = vUv - 0.5;
          float radial = 1.0 - smoothstep(0.0, 0.65, length(c));

          // Edge frame — top and bottom thin highlights
          float topEdge    = smoothstep(0.97, 1.0, vUv.y);
          float botEdge    = smoothstep(0.97, 1.0, 1.0 - vUv.y);
          float leftEdge   = smoothstep(0.985, 1.0, 1.0 - vUv.x);
          float rightEdge  = smoothstep(0.985, 1.0, vUv.x);
          float edgeFrame  = max(max(topEdge, botEdge), max(leftEdge, rightEdge));

          vec3 base = uMoodColor * 0.18;
          vec3 col  = base + uMoodColor * radial * 0.30 + uMoodColor * fresnel * 0.45 + edgeFrame * uMoodColor * 1.4;

          float alpha = (0.05 + radial * 0.10 + fresnel * 0.18 + edgeFrame * 0.95) * uOpacity;
          gl_FragColor = vec4(col, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.NormalBlending,
      side: THREE.DoubleSide,
    });
    const card = new THREE.Mesh(cardGeo, cardMat);
    card.position.set(0, 1.4, 0);
    scene.add(card);

    // Soft additive halo behind the card — sells "glass catching light"
    const haloGeo = new THREE.PlaneGeometry(5.4, 3.0, 1, 1);
    const haloMat = new THREE.ShaderMaterial({
      uniforms: {
        uOpacity:   { value: 0.0 },
        uMoodColor: { value: moodColor },
      },
      vertexShader: /* glsl */`
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: /* glsl */`
        uniform float uOpacity;
        uniform vec3  uMoodColor;
        varying vec2 vUv;
        void main() {
          vec2 c = vUv - 0.5;
          float d = length(c) * 1.4;
          float a = pow(max(0.0, 1.0 - d), 2.4) * uOpacity;
          gl_FragColor = vec4(uMoodColor * 1.4, a * 0.55);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    halo.position.set(0, 1.4, -0.05);
    scene.add(halo);

    /* ════════════════════════════════════════════════════════════════
       5 · EIGHT EQ BARS — same glassmorphism as the app
       ──────────────────────────────────────────────────────────────── */
    const BAR_COUNT = 8;
    const BAR_WIDTH = 0.18;
    const BAR_DEPTH = 0.10;
    const BAR_SPACING = 0.34;
    const BAR_BASE_HEIGHT = 0.85;

    // Frequency-shaped EQ curve — dips in mids, lifts highs (mood-dependent)
    const BAR_GAINS = [0.55, 0.72, 0.45, 0.38, 0.50, 0.78, 0.92, 0.68];

    const barMaterial = (heightUniform) => new THREE.ShaderMaterial({
      uniforms: {
        uColor:    { value: moodColor },
        uWarm:     { value: moodWarm },
        uOpacity:  { value: 0.0 },
        uHeight:   heightUniform,
        uTime:     { value: 0 },
        uActive:   { value: 0.0 }, // bumps glow when "tweaked"
      },
      vertexShader: /* glsl */`
        varying vec3 vNormal;
        varying vec3 vViewPos;
        varying vec3 vWorldPos;
        varying vec3 vLocalPos;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          vViewPos = -mvPos.xyz;
          vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
          vLocalPos = position;
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: /* glsl */`
        uniform vec3  uColor;
        uniform vec3  uWarm;
        uniform float uOpacity;
        uniform float uHeight;
        uniform float uTime;
        uniform float uActive;
        varying vec3 vNormal;
        varying vec3 vViewPos;
        varying vec3 vWorldPos;
        varying vec3 vLocalPos;

        void main() {
          vec3 V = normalize(vViewPos);
          float fresnel = pow(1.0 - max(0.0, dot(vNormal, V)), 2.6);

          // Vertical gradient inside the bar — base dim, top bright
          float yNorm = (vLocalPos.y / max(0.001, uHeight)) + 0.5;
          float topGlow = pow(yNorm, 2.3) * 0.85;

          // Bright cap at the very top edge
          float topEdge = smoothstep(0.94, 1.0, yNorm);

          // Subtle scan / shimmer — sells "live audio"
          float shimmer = sin(yNorm * 18.0 - uTime * 1.6) * 0.04 + 0.04;

          vec3 col = uColor * (0.18 + topGlow * 0.55) + uWarm * fresnel * 0.5 + topEdge * uWarm * 1.6;
          col += uActive * uWarm * 0.55;

          float alpha = (0.16 + fresnel * 0.55 + topGlow * 0.38 + topEdge * 0.7) * uOpacity;
          gl_FragColor = vec4(col + shimmer * uColor, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide,
    });

    const bars = [];
    for (let i = 0; i < BAR_COUNT; i++) {
      const heightU = { value: BAR_BASE_HEIGHT * BAR_GAINS[i] };
      const geo = new THREE.BoxGeometry(BAR_WIDTH, 1, BAR_DEPTH); // unit-tall, scaled per-frame
      const mat = barMaterial(heightU);
      const mesh = new THREE.Mesh(geo, mat);

      const x = (i - (BAR_COUNT - 1) / 2) * BAR_SPACING;
      mesh.position.set(x, 1.4, 0.04);
      mesh.scale.y = heightU.value;
      mesh.userData = {
        targetHeight: heightU.value,
        currentHeight: heightU.value,
        revealAt: 8.6 + i * 0.085,   // staggered materialise
        revealDur: 0.55,
        startOpacity: 0,
        targetOpacity: 1,
        active: 0,
      };
      bars.push(mesh);
      scene.add(mesh);

      // Each bar gets its own back-light halo — additive glow that catches the particles
      const barHaloGeo = new THREE.PlaneGeometry(BAR_WIDTH * 4.5, BAR_BASE_HEIGHT * 2.4, 1, 1);
      const barHaloMat = new THREE.ShaderMaterial({
        uniforms: {
          uColor:   { value: moodColor },
          uOpacity: { value: 0.0 },
        },
        vertexShader: /* glsl */`
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: /* glsl */`
          uniform vec3 uColor;
          uniform float uOpacity;
          varying vec2 vUv;
          void main() {
            vec2 c = vUv - 0.5;
            float d = length(vec2(c.x * 2.4, c.y * 1.0));
            float a = pow(max(0.0, 1.0 - d), 2.5) * uOpacity;
            gl_FragColor = vec4(uColor * 1.2, a * 0.65);
          }
        `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const barHalo = new THREE.Mesh(barHaloGeo, barHaloMat);
      barHalo.position.set(x, 1.4, -0.10);
      mesh.userData.halo = barHalo;
      scene.add(barHalo);
    }

    /* ════════════════════════════════════════════════════════════════
       6 · TIMELINE — five shots, 16 seconds total
       ────────────────────────────────────────────────────────────────
       0.0 – 4.0  · BOKEH DRIFT   focal far, aperture wide → all blur
       4.0 – 7.5  · FOCUS PULL    focal racks to card distance
       7.5 – 10.5 · CARD MATERIALISE — particle field dims, card+halo fade in
       10.5 – 13.5 · BARS TWEAK IN — staggered glass bars; one bar pumps
       13.5 – 16.0 · PULL BACK + WORDMARK
       ──────────────────────────────────────────────────────────────── */
    function smoothstep(a, b, x) {
      const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
      return t * t * (3 - 2 * t);
    }
    function lerp(a, b, k) { return a + (b - a) * k; }
    function lerpColor(target, a, b, k) {
      target.r = a.r + (b.r - a.r) * k;
      target.g = a.g + (b.g - a.g) * k;
      target.b = a.b + (b.b - a.b) * k;
    }

    const TL = {
      end: 16.0,

      // Camera path
      cam: {
        start:  new THREE.Vector3(0,  1.7, 11.5),
        mid:    new THREE.Vector3(0,  1.5,  7.2),
        close:  new THREE.Vector3(-0.4, 1.45, 5.4),
        wide:   new THREE.Vector3(0,  2.1,  8.6),
      },
      look: {
        start:  new THREE.Vector3(0,  1.4, 0),
        end:    new THREE.Vector3(0,  1.4, 0),
      },

      // Focal plane — distance from camera at which particles are sharp
      focalFar:   12.5,
      focalCard:  5.4,

      // Aperture — bigger means more blur
      apertureWide: 0.34,
      apertureMid:  0.18,
      apertureTight: 0.05,

      particleOpacity: { full: 1.0, dim: 0.32 },
    };

    function setMood(name, k) {
      const m = MOODS[name];
      // smooth blend toward target from current
      moodColor.lerp(m.color, k);
      moodWarm.lerp(m.warm, k);
    }

    let t0 = 0, hudShown = false;

    function tick(now) {
      if (!t0) t0 = now;
      const t = Math.min(TL.end, (now - t0) / 1000);

      /* ─── CAMERA ────────────────────────────────────────────────── */
      let camPos, lookPos;
      if (t < 4.0) {
        // Slow push from start to mid
        const k = smoothstep(0, 4.0, t);
        camPos = TL.cam.start.clone().lerp(TL.cam.mid, k);
        lookPos = TL.look.start.clone();
      } else if (t < 10.5) {
        // Continue push toward close-up of card
        const k = smoothstep(4.0, 10.5, t);
        camPos = TL.cam.mid.clone().lerp(TL.cam.close, k);
        lookPos = TL.look.start.clone();
      } else if (t < 13.5) {
        // Hold on close-up with subtle parallax
        const k = smoothstep(10.5, 13.5, t);
        camPos = TL.cam.close.clone();
        camPos.x += Math.sin(t * 0.5) * 0.05;
        camPos.y += Math.sin(t * 0.7) * 0.02;
        lookPos = TL.look.start.clone();
      } else {
        // Pull back wide
        const k = smoothstep(13.5, 16.0, t);
        camPos = TL.cam.close.clone().lerp(TL.cam.wide, k);
        lookPos = TL.look.start.clone();
      }
      camera.position.copy(camPos);
      camera.lookAt(lookPos);

      /* ─── DEPTH OF FIELD — the heart of the reveal ──────────────── */
      let focal, aperture;
      if (t < 4.0) {
        // Pure bokeh — focal far away, wide aperture
        focal = TL.focalFar;
        aperture = TL.apertureWide;
      } else if (t < 7.5) {
        // Focus rack — focal pulls in to card distance, aperture tightens
        const k = smoothstep(4.0, 7.5, t);
        focal = lerp(TL.focalFar, TL.focalCard, k);
        aperture = lerp(TL.apertureWide, TL.apertureMid, k);
      } else if (t < 13.5) {
        // Locked on card; aperture tightens further so card+bars are razor sharp
        const k = smoothstep(7.5, 10.5, t);
        focal = TL.focalCard;
        aperture = lerp(TL.apertureMid, TL.apertureTight, k);
      } else {
        // Pull back — open aperture slightly to soften background again
        const k = smoothstep(13.5, 16.0, t);
        focal = lerp(TL.focalCard, 7.0, k);
        aperture = lerp(TL.apertureTight, 0.10, k);
      }
      particleMat.uniforms.uFocalDist.value = focal;
      particleMat.uniforms.uAperture.value  = aperture;
      particleMat.uniforms.uTime.value = t;

      /* ─── PARTICLE OPACITY — dims as card takes over ────────────── */
      let pOpacity;
      if (t < 7.5) pOpacity = TL.particleOpacity.full;
      else if (t < 10.5) {
        const k = smoothstep(7.5, 10.5, t);
        pOpacity = lerp(TL.particleOpacity.full, TL.particleOpacity.dim, k);
      } else if (t < 13.5) pOpacity = TL.particleOpacity.dim;
      else {
        // On pull-back, restore some particle presence so the field doesn't disappear
        const k = smoothstep(13.5, 16.0, t);
        pOpacity = lerp(TL.particleOpacity.dim, 0.55, k);
      }
      particleMat.uniforms.uOpacity.value = pOpacity;

      /* ─── MOOD CHOREOGRAPHY ─────────────────────────────────────── */
      // 0–5  cruising → 5–9 locked → 9–13 drift → 13–16 settles back to cruising
      let targetMood;
      if (t < 5.0) targetMood = 'cruising';
      else if (t < 9.0) targetMood = 'locked';
      else if (t < 13.0) targetMood = 'drift';
      else targetMood = 'cruising';
      setMood(targetMood, 0.045);

      // Push current mood color into shared uniform refs
      particleMat.uniforms.uMoodColor.value = moodColor;
      particleMat.uniforms.uMoodWarm.value  = moodWarm;
      cardMat.uniforms.uMoodColor.value     = moodColor;
      haloMat.uniforms.uMoodColor.value     = moodColor;

      /* ─── CARD + HALO FADE-IN ───────────────────────────────────── */
      let cardOpacity;
      if (t < 7.5) cardOpacity = 0;
      else if (t < 10.0) cardOpacity = smoothstep(7.5, 10.0, t);
      else cardOpacity = 1.0;
      cardMat.uniforms.uOpacity.value = cardOpacity;
      cardMat.uniforms.uTime.value = t;
      haloMat.uniforms.uOpacity.value = cardOpacity * 0.85;

      /* ─── BARS — staggered materialise + EQ tweak ───────────────── */
      bars.forEach((bar, i) => {
        const ud = bar.userData;
        const localT = t - ud.revealAt;
        const k = smoothstep(0, ud.revealDur, localT);
        const op = k;
        bar.material.uniforms.uOpacity.value = op;
        ud.halo.material.uniforms.uColor = bar.material.uniforms.uColor;
        ud.halo.material.uniforms.uOpacity.value = op * 0.45;

        // Subtle "settling" wobble as bars first appear
        const settle = (1 - k) * Math.sin(localT * 22) * 0.06;
        let h = ud.targetHeight * (0.4 + 0.6 * k) + settle;

        // EQ TWEAK — between t=11.6 and 12.6, push bar 6 up dramatically
        let active = 0;
        if (t > 11.6 && t < 12.8 && i === 6) {
          const tk = smoothstep(11.6, 12.1, t) * (1 - smoothstep(12.4, 12.8, t));
          h += 0.45 * tk;
          active = tk;
        }
        // And subtle dip on bar 3
        if (t > 11.9 && t < 12.9 && i === 3) {
          const tk = smoothstep(11.9, 12.3, t) * (1 - smoothstep(12.5, 12.9, t));
          h -= 0.18 * tk;
          active = tk * 0.6;
        }
        ud.currentHeight = lerp(ud.currentHeight, h, 0.18);
        bar.scale.y = Math.max(0.05, ud.currentHeight);
        // Bar pivots from center; raise so its bottom anchors at card line (1.4 - 0.4)
        bar.position.y = 1.0 + bar.scale.y * 0.5;

        bar.material.uniforms.uHeight.value = ud.currentHeight;
        bar.material.uniforms.uActive.value = lerp(bar.material.uniforms.uActive.value, active, 0.18);
        bar.material.uniforms.uTime.value   = t;
        bar.material.uniforms.uColor.value  = moodColor;
        bar.material.uniforms.uWarm.value   = moodWarm;

        ud.halo.position.y = bar.position.y;
        ud.halo.material.uniforms.uColor.value = moodColor;
      });

      /* ─── WORDMARK ──────────────────────────────────────────────── */
      if (t > 13.4 && wordmark.style.opacity !== '1') {
        wordmark.style.opacity = '1';
        wordmark.style.letterSpacing = '0.34em';
      }
      if (t > 14.0 && tagline.style.opacity !== '1') {
        tagline.style.opacity = '1';
      }
      if (t >= TL.end - 0.05 && replay.style.opacity !== '1') {
        replay.style.opacity = '1';
      }

      /* ─── HUD ───────────────────────────────────────────────────── */
      if (hud.classList.contains('show')) {
        hud.textContent =
          't = ' + t.toFixed(2) +
          ' · focal ' + focal.toFixed(2) +
          ' · ap ' + aperture.toFixed(3) +
          ' · pOp ' + pOpacity.toFixed(2) +
          ' · cardOp ' + cardOpacity.toFixed(2) +
          ' · mood ' + targetMood;
      }

      renderer.render(scene, camera);
      if (t < TL.end) {
        requestAnimationFrame(tick);
      } else {
        // Hold the final frame, keep updating subtle drift but stop the main loop
        requestAnimationFrame(holdFrame);
      }
    }

    function holdFrame(now) {
      const t = TL.end + ((now - t0) / 1000 - TL.end);
      particleMat.uniforms.uTime.value = t;
      cardMat.uniforms.uTime.value = t;
      bars.forEach(b => b.material.uniforms.uTime.value = t);
      renderer.render(scene, camera);
      requestAnimationFrame(holdFrame);
    }

    /* ════════════════════════════════════════════════════════════════
       7 · CONTROLS
       ──────────────────────────────────────────────────────────────── */
    function reset() {
      t0 = 0;
      wordmark.style.transition = 'none';
      wordmark.style.opacity = '0';
      wordmark.style.letterSpacing = '0.55em';
      tagline.style.opacity = '0';
      replay.style.opacity = '0';
      // Reset moods
      moodColor.copy(MOODS.cruising.color);
      moodWarm.copy(MOODS.cruising.warm);
      // Reset bars
      bars.forEach((bar, i) => {
        bar.userData.currentHeight = 0.05;
        bar.scale.y = 0.05;
        bar.position.y = 1.0;
        bar.material.uniforms.uOpacity.value = 0;
        bar.material.uniforms.uActive.value  = 0;
        bar.userData.halo.material.uniforms.uOpacity.value = 0;
      });
      cardMat.uniforms.uOpacity.value = 0;
      haloMat.uniforms.uOpacity.value = 0;
      // Re-enable transitions on next frame
      requestAnimationFrame(() => {
        wordmark.style.transition = '';
      });
      requestAnimationFrame(tick);
    }

    replay.addEventListener('click', reset);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') reset();
      if (e.key === 'h' || e.key === 'H') hud.classList.toggle('show');
      if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }
    });

    // Initial bar state — invisible until reveal
    bars.forEach(bar => {
      bar.scale.y = 0.05;
      bar.position.y = 1.0;
      bar.material.uniforms.uOpacity.value = 0;
      bar.userData.currentHeight = 0.05;
    });

    requestAnimationFrame(tick);
  </script>
</body>
</html>
