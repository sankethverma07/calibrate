<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calibrate · Sandbox</title>
    <link href="https://fonts.cdnfonts.com/css/pp-neue-montreal" rel="stylesheet">
    <style>
      :root { --bg: #04060a; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        background: var(--bg);
        color: #fff;
        font-family: 'PP Neue Montreal', -apple-system, BlinkMacSystemFont, sans-serif;
        width: 100%; height: 100%;
        overflow: hidden;
      }
      canvas { display: block; }
      .hud {
        position: fixed;
        bottom: 18px; left: 18px;
        z-index: 999;
        font-family: 'JetBrains Mono', 'SF Mono', monospace;
        font-size: 11px;
        color: rgba(255,255,255,0.6);
        background: rgba(0,0,0,0.4);
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        pointer-events: none;
        line-height: 1.6;
      }
      .hud b { color: rgba(255,255,255,0.9); font-weight: 500; }
      .hud kbd {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 3px;
        padding: 1px 5px;
        font-family: inherit;
        font-size: 10px;
      }

      /* "Smart Equalizer" text reveal — full overlay, no wave behind */
      .titlecard {
        position: fixed;
        inset: 0;
        z-index: 50;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: radial-gradient(ellipse at center, rgba(4,6,10,0) 30%, rgba(4,6,10,0.85) 80%);
        opacity: 0;
        transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .titlecard.show { opacity: 1; }

      /* Per-letter container — Samsung/Apple/Google hybrid reveal.
         Each letter spins through 3D space from a back-camera Y-rotation,
         scales through an overshoot, and lands with slight bounce.
         References:
           - Samsung Galaxy Unpacked title reveals (rotateY 180→0, scale overshoot)
           - Apple iPhone stinger films (translateY rise + ease-out)
           - Google Pixel ads (subtle rotateZ tilt + Z-depth push) */
      .titlecard .title {
        font-family: 'PP Neue Montreal', -apple-system, sans-serif;
        font-weight: 200;
        font-size: clamp(56px, 7.5vw, 130px);
        letter-spacing: -0.025em;
        color: #f5f5f4;
        text-shadow:
          0 0 80px rgba(255,255,255,0.25),
          0 0 200px rgba(96, 165, 250, 0.22),
          0 2px 12px rgba(0,0,0,0.5);
        perspective: 1200px;
        display: inline-block;
      }
      .titlecard .title .ch {
        display: inline-block;
        opacity: 0;
        /* Start: letter is rotated 90° on Y (edge-on, invisible),
           pushed back in Z, lifted slightly, scaled small */
        transform:
          translate3d(0, 80px, -180px)
          rotateY(-90deg)
          rotateZ(-8deg)
          scale(0.45);
        transform-origin: 50% 100%;
        transform-style: preserve-3d;
        /* Slow-motion durations — 1.4s per letter, easing with slight
           overshoot for a "physical settle" feel */
        transition:
          opacity 1.0s cubic-bezier(0.22, 1, 0.36, 1),
          transform 1.4s cubic-bezier(0.34, 1.32, 0.55, 1);
      }
      .titlecard .title .ch.space { width: 0.34em; }
      .titlecard.show .title .ch {
        opacity: 1;
        transform:
          translate3d(0, 0, 0)
          rotateY(0)
          rotateZ(0)
          scale(1);
      }

      /* The subtitle reveals after all letters have landed */
      .titlecard .subtitle {
        margin-top: 26px;
        font-family: 'PP Neue Montreal', sans-serif;
        font-weight: 400;
        font-size: clamp(13px, 1.0vw, 16px);
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.55);
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.6s,
          transform 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.6s;
      }
      .titlecard.show .subtitle { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
